<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stöbelturnier 2026 – Beamer Dashboard</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700;800;900&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0a;
    --surface: #141414;
    --surface2: #1e1e1e;
    --border: #2a2a2a;
    --accent: #d42b2b;
    --accent2: #a81f1f;
    --text: #f0f0f0;
    --muted: #888;
    --green: #27ae60;
    --gold: #f0c040;
    /* 4K base: 1px = ~0.26mm, scale everything up */
    --scale: 1;
  }

  html {
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    background: var(--bg);
  }

  body {
    width: 3840px;
    height: 2160px;
    overflow: hidden;
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    transform-origin: top left;
    /* Scale set dynamically by JS */
  }

  /* ── Layout ── */
  .layout {
    display: grid;
    grid-template-rows: 160px 1fr 180px;
    height: 2160px;
    width: 3840px;
  }

  /* ── Header ── */
  .header {
    background: linear-gradient(90deg, #1a0000 0%, #1e0808 60%, #1a0000 100%);
    border-bottom: 6px solid var(--accent);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 80px;
    box-shadow: 0 4px 40px rgba(212,43,43,0.3);
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: 40px;
  }

  .header-logo {
    font-size: 5rem;
    line-height: 1;
  }

  .header-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 5.5rem;
    color: #fff;
    letter-spacing: 6px;
    text-shadow: 0 0 40px rgba(212,43,43,0.8);
    line-height: 1;
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 60px;
  }

  .round-info {
    text-align: right;
  }

  .round-label {
    font-size: 1.4rem;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 4px;
  }

  .round-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 7rem;
    color: var(--accent);
    line-height: 1;
    text-shadow: 0 0 30px rgba(212,43,43,0.6);
  }

  .clock {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 5rem;
    color: var(--text);
    letter-spacing: 4px;
    text-align: right;
  }

  /* ── Main content ── */
  .content {
    display: grid;
    grid-template-columns: 1fr;
    overflow: hidden;
  }

  /* ── Paarungen panel ── */
  .panel {
    padding: 50px 60px;

    overflow: hidden;
  }

  .panel-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2.8rem;
    color: var(--accent);
    letter-spacing: 4px;
    margin-bottom: 30px;
    padding-bottom: 16px;
    border-bottom: 3px solid var(--border);
    display: flex;
    align-items: center;
    gap: 20px;
  }

  /* ── Pairing rows ── */
  .pairing-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 22px;
  }

  .pairing-item {
    background: var(--surface);
    border: 2px solid var(--border);
    border-radius: 16px;
    padding: 28px 32px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    transition: border-color 0.3s;
  }

  .pairing-item.has-result {
    border-color: #2a2a2a;
  }

  .pairing-item.open {
    border-color: rgba(212,43,43,0.3);
  }

  .pairing-field {
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 2px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .pairing-teams {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    gap: 16px;
  }

  .pairing-team-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.9rem;
    line-height: 1.1;
    letter-spacing: 1px;
  }

  .pairing-team-name.right { text-align: right; }

  .pairing-score {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 3rem;
    color: var(--accent);
    letter-spacing: 6px;
    text-align: center;
    white-space: nowrap;
  }

  .pairing-score.open-score {
    font-size: 1.5rem;
    color: var(--muted);
    letter-spacing: 2px;
  }

  .score-win { color: var(--green); }
  .score-loss { color: var(--muted); }

  /* ── Standings overlay ── */
  .standings-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.92);
    z-index: 100;
    padding: 80px 120px;
    flex-direction: column;
    gap: 30px;
  }
  .standings-overlay.visible { display: flex; }

  .standings-overlay-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 4rem;
    color: var(--accent);
    letter-spacing: 6px;
    text-shadow: 0 0 30px rgba(212,43,43,0.6);
    border-bottom: 4px solid var(--border);
    padding-bottom: 30px;
  }

  .standings-grid {
    display: flex;
    flex-direction: column;
    gap: 20px;
    flex: 1;
    overflow-y: auto;
  }

  .standing-row {
    display: grid;
    grid-template-columns: 80px 1fr 120px 160px 120px;
    align-items: center;
    gap: 20px;
    padding: 20px 28px;
    background: var(--surface);
    border-radius: 12px;
    border: 2px solid var(--border);
  }

  .standing-row.top1 { border-color: var(--gold); background: rgba(240,192,64,0.06); }
  .standing-row.top2 { border-color: #b0b8c8; background: rgba(176,184,200,0.04); }
  .standing-row.top3 { border-color: #c07a40; background: rgba(192,122,64,0.04); }

  .standing-rank { font-family:'Bebas Neue',sans-serif; font-size:2.8rem; text-align:center; color:var(--muted); }
  .standing-rank.r1 { color:var(--gold); text-shadow:0 0 20px rgba(240,192,64,0.5); }
  .standing-rank.r2 { color:#b0b8c8; }
  .standing-rank.r3 { color:#c07a40; }
  .standing-name { font-family:'Bebas Neue',sans-serif; font-size:2rem; letter-spacing:1px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .standing-pts { font-family:'Bebas Neue',sans-serif; font-size:2.6rem; color:var(--accent); text-align:right; }
  .standing-diff { font-size:1.4rem; font-weight:700; text-align:right; }
  .standing-record { font-size:1.1rem; color:var(--muted); text-align:right; font-weight:600; }

  /* ── Sponsor Banner ── */
  .sponsor-bar {
    background: #111;
    border-top: 4px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 80px;
    gap: 60px;
    overflow: hidden;
  }

  .sponsor-label {
    font-size: 1.3rem;
    font-weight: 700;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 3px;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .sponsor-divider {
    width: 3px;
    height: 80px;
    background: var(--border);
    flex-shrink: 0;
  }

  .sponsor-track {
    flex: 1;
    overflow: hidden;
    position: relative;
    height: 130px;
  }

  .sponsor-slides {
    display: flex;
    align-items: center;
    height: 100%;
    gap: 120px;
    /* width set by JS, animation added by JS */
  }

  @keyframes marquee {
    0%   { transform: translateX(0); }
    100% { transform: translateX(-50%); }
  }

  .sponsor-slide {
    display: flex;
    align-items: center;
    justify-content: center;
    min-width: 420px;
    height: 120px;
    flex-shrink: 0;
    padding: 0 20px;
    border-right: 2px solid var(--border);
  }

  .sponsor-slide img {
    max-height: 110px;
    max-width: 400px;
    object-fit: contain;
    filter: brightness(0) invert(1);
  }

  .sponsor-slide .sponsor-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 3rem;
    color: var(--text);
    letter-spacing: 3px;
    text-align: center;
    white-space: nowrap;
  }

  /* ── Status dot ── */
  .status-dot {
    width: 20px; height: 20px;
    border-radius: 50%;
    background: var(--green);
    animation: pulse 2s infinite;
    flex-shrink: 0;
  }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

  /* ── Bye row ── */
  .bye-item {
    background: var(--surface);
    border: 2px solid var(--border);
    border-radius: 16px;
    padding: 28px 32px;
    display: flex;
    align-items: center;
    gap: 20px;
    color: var(--muted);
  }

  .bye-item .bye-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.9rem;
    color: var(--text);
  }

  /* ── Transition for content views ── */
  .view { display: none; }
  .view.active { display: flex; flex-direction: column; }
</style>
</head>
<body>

<div class="layout">

  <!-- HEADER -->
  <div class="header">
    <div class="header-left">
      <div class="header-logo">🔥</div>
      <div class="header-title" id="dash-title">Stöbelturnier 2026</div>
    </div>
    <div class="header-right">
      <div style="display:flex;align-items:center;gap:16px">
        <div class="status-dot" id="status-dot"></div>
        <span style="font-size:1.2rem;color:var(--muted);letter-spacing:2px" id="status-text">Verbinde...</span>
      </div>
      <div class="round-info">
        <div class="round-label">Runde</div>
        <div class="round-num" id="dash-round">–</div>
      </div>
      <div class="clock" id="clock">00:00</div>
    </div>
  </div>

  <!-- MAIN CONTENT -->
  <div class="content">
    <div class="panel">
      <div class="panel-title">
        🎯 Aktuelle Paarungen
        <span style="font-size:1.4rem;color:var(--muted);font-family:Inter;font-weight:600;letter-spacing:1px" id="open-count"></span>
      </div>
      <div class="pairing-grid" id="pairing-grid">
        <div style="color:var(--muted);font-size:2rem;padding:40px">Lade Paarungen...</div>
      </div>
    </div>
  </div>

  <!-- TABELLE OVERLAY (einblendbar per Admin) -->
  <div class="standings-overlay" id="standings-overlay">
    <div class="standings-overlay-title">🏆 Aktuelle Tabelle – Runde <span id="overlay-round">–</span></div>
    <div class="standings-grid" id="standings-grid"></div>
  </div>

  <!-- SPONSOR BANNER -->
  <div class="sponsor-bar">
    <div class="sponsor-label">Unsere Sponsoren</div>
    <div class="sponsor-divider"></div>
    <div class="sponsor-track">
      <div class="sponsor-slides" id="sponsor-slides"></div>
    </div>
  </div>

</div>

<script type="module">
// ── Firebase Config (same as main app) ──
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyBukGl8KprWShSKyIuK6l4rfHM8kabKbwk",
  authDomain: "ffpstoebel.firebaseapp.com",
  databaseURL: "https://ffpstoebel-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "ffpstoebel",
  appId: "1:899454609586:web:40465b0c61489f51cfc1ab"
};

// ── Sponsors – Bilder in denselben Ordner wie dashboard.html legen ──
// Format: { name, logo } – logo = Dateiname (z.B. 'sponsor1.png') oder null für Text
const SPONSORS = [
  { name: 'Raiffeisen Timelkam-Lenzing-Puchkirchen', logo: 'raika.svg' },
  { name: 'Fliesen Gaborek',                          logo: 'gaborek.png' },
  { name: 'Atos Schiemer',                            logo: 'logo-atos.gif' },
  // Weitere Sponsoren hier einfügen:
  // { name: 'Sponsor Name', logo: 'dateiname.png' },
  // { name: 'Nur Text',     logo: null },
];

// ── State ──
let state = { teams:{}, rounds:{}, currentRound:0, settings:{} };
let sponsorIdx = 0;

// ── Clock ──
function updateClock() {
  const now = new Date();
  const h = String(now.getHours()).padStart(2,'0');
  const m = String(now.getMinutes()).padStart(2,'0');
  document.getElementById('clock').textContent = h + ':' + m;
}
setInterval(updateClock, 1000);
updateClock();

// ── Firebase ──
async function init() {
  try {
    const { initializeApp, getApps, getApp } = await import('https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js');
    const { getDatabase, ref, onValue } = await import('https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js');

    const app = getApps().length ? getApp() : initializeApp(FIREBASE_CONFIG);
    const db = getDatabase(app);

    onValue(ref(db, '/tournament'), snap => {
      const d = snap.val() || {};
      state.teams = d.teams || {};
      state.rounds = d.rounds || {};
      state.currentRound = d.currentRound || 0;
      state.settings = d.settings || {};
      document.getElementById('status-dot').style.background = '#27ae60';
      document.getElementById('status-text').textContent = 'Live';
      renderAll();
    }, err => {
      document.getElementById('status-dot').style.background = '#e74c3c';
      document.getElementById('status-text').textContent = 'Fehler: ' + err.message;
    });
  } catch(e) {
    document.getElementById('status-dot').style.background = '#e74c3c';
    document.getElementById('status-text').textContent = 'Init-Fehler: ' + e.message;
  }
}

// ── Standings calc ──
function calcStandings() {
  const ids = Object.keys(state.teams);
  if (!ids.length) return [];
  const s = {};
  ids.forEach(id => s[id] = { pts:0, wins:0, draws:0, losses:0, diff:0, played:0 });
  Object.values(state.rounds).forEach(round => {
    if (!Array.isArray(round)) return;
    round.forEach(m => {
      if (m.bye) { if (s[m.team1]) s[m.team1].played+=1; return; }
      if (m.score1===undefined||!s[m.team1]||!s[m.team2]) return;
      s[m.team1].played+=1; s[m.team2].played+=1;
      s[m.team1].diff+=m.score1-m.score2; s[m.team2].diff+=m.score2-m.score1;
      if (m.score1>m.score2){ s[m.team1].pts+=2; s[m.team1].wins+=1; s[m.team2].losses+=1; }
      else if (m.score2>m.score1){ s[m.team2].pts+=2; s[m.team2].wins+=1; s[m.team1].losses+=1; }
      else { s[m.team1].pts+=1; s[m.team2].pts+=1; s[m.team1].draws+=1; s[m.team2].draws+=1; }
    });
  });
  return ids.map(id=>({id, name:state.teams[id]?.name||id, ...s[id]}))
            .sort((a,b)=>b.pts-a.pts||b.diff-a.diff||b.wins-a.wins||a.name.localeCompare(b.name));
}

function tn(id) { return state.teams[id]?.name || id; }

// ── Render pairings – offen zuerst, eingetragen unten ──
function renderPairings() {
  const grid = document.getElementById('pairing-grid');
  const round = state.rounds[state.currentRound];
  document.getElementById('dash-round').textContent = state.currentRound || '–';
  document.getElementById('dash-title').textContent = '🔥 ' + (state.settings?.title || 'Stöbelturnier 2026');
  document.getElementById('overlay-round').textContent = state.currentRound || '–';

  if (!round || !round.length) {
    grid.innerHTML = '<div style="color:var(--muted);font-size:2.5rem;padding:60px;grid-column:1/-1">Noch keine Paarungen</div>';
    document.getElementById('open-count').textContent = '';
    return;
  }

  // Sort: bye first, then open matches, then completed
  const byes    = round.filter(m => m.bye);
  const open    = round.filter(m => !m.bye && m.score1 === undefined);
  const done    = round.filter(m => !m.bye && m.score1 !== undefined);
  const sorted  = [...byes, ...open, ...done];

  const openCount = open.length;
  const doneCount = done.length;
  const total = open.length + done.length;
  document.getElementById('open-count').textContent =
    openCount > 0
      ? `· ${doneCount}/${total} eingetragen`
      : `· Alle ${total} eingetragen ✓`;

  const pairingCard = (m, isOpen) => {
    if (m.bye) return `
      <div class="bye-item">
        <span style="font-size:2rem">🔄</span>
        <span class="bye-name">${tn(m.team1)}</span>
        <span style="font-size:1.3rem;color:var(--muted)">Freirunde</span>
      </div>`;

    const fieldStr = m.field ? `<span>📍 Feld ${m.field}</span>` : '';

    if (!isOpen) {
      const s1c = m.score1>m.score2?'score-win':m.score1<m.score2?'score-loss':'';
      const s2c = m.score2>m.score1?'score-win':m.score2<m.score1?'score-loss':'';
      return `
        <div class="pairing-item has-result" style="opacity:0.65">
          <div class="pairing-field" style="color:var(--muted)">${fieldStr}</div>
          <div class="pairing-teams">
            <div class="pairing-team-name" style="color:var(--muted)">${tn(m.team1)}</div>
            <div class="pairing-score">
              <span class="${s1c}">${m.score1}</span>
              <span style="color:var(--border)">:</span>
              <span class="${s2c}">${m.score2}</span>
            </div>
            <div class="pairing-team-name right" style="color:var(--muted)">${tn(m.team2)}</div>
          </div>
        </div>`;
    } else {
      return `
        <div class="pairing-item open">
          <div class="pairing-field">${fieldStr}</div>
          <div class="pairing-teams">
            <div class="pairing-team-name">${tn(m.team1)}</div>
            <div class="pairing-score open-score">VS</div>
            <div class="pairing-team-name right">${tn(m.team2)}</div>
          </div>
        </div>`;
    }
  };

  grid.innerHTML = sorted.map(m => pairingCard(m, m.score1 === undefined && !m.bye)).join('');
}

// ── Zone calculation ──
function calcZones(data) {
  if (!data.length) return [];
  const maxPts = data[0].pts;
  const minPts = data[data.length-1].pts;
  const spread = maxPts - minPts || 1;
  const topThreshold    = maxPts - Math.max(2, Math.round(spread * 0.20));
  const bottomThreshold = minPts + Math.max(2, Math.round(spread * 0.20));
  return data.map(t => {
    if (t.pts >= topThreshold)    return 'top';
    if (t.pts <= bottomThreshold) return 'bottom';
    return 'mid';
  });
}

// ── Render standings overlay – zone-based, no rank ──
function renderStandings() {
  const grid = document.getElementById('standings-grid');
  const data = calcStandings();
  if (!data.length) {
    grid.innerHTML = '<div style="color:var(--muted);font-size:2rem;padding:40px;grid-column:1/-1">Noch keine Ergebnisse</div>';
    return;
  }

  const zones = calcZones(data);
  const ZONE = {
    top:    { icon:'🏆', label:'Kann gewinnen',   bg:'rgba(240,192,64,0.10)', border:'rgba(240,192,64,0.4)',  color:'#f0c040' },
    mid:    { icon:'🟢', label:'Mittelfeld',       bg:'rgba(39,174,96,0.08)',  border:'rgba(39,174,96,0.3)',   color:'#27ae60' },
    bottom: { icon:'🍍', label:'Goldene Ananas',  bg:'rgba(212,43,43,0.10)',  border:'rgba(212,43,43,0.4)',   color:'#d42b2b' },
  };

  // Group by zone
  const groups = { top: [], mid: [], bottom: [] };
  data.forEach((t,i) => groups[zones[i]].push(t));

  let html = '';
  for (const zone of ['top','mid','bottom']) {
    const items = groups[zone];
    if (!items.length) continue;
    const z = ZONE[zone];

    html += `<div style="grid-column:1/-1;padding:18px 28px 10px;
      background:${z.bg};border:2px solid ${z.border};border-radius:14px;margin-bottom:6px">
      <div style="font-family:'Bebas Neue',sans-serif;font-size:2.2rem;color:${z.color};
        letter-spacing:3px;margin-bottom:12px">${z.icon} ${z.label}</div>
      <div style="display:flex;flex-wrap:wrap;gap:14px">
        ${items.map(t => `
          <div style="background:rgba(0,0,0,0.3);border:1px solid ${z.border};
            border-radius:10px;padding:14px 22px;display:flex;flex-direction:column;gap:4px;min-width:320px">
            <div style="font-family:'Bebas Neue',sans-serif;font-size:2rem;
              letter-spacing:1px;line-height:1">${t.name}</div>
            <div style="display:flex;gap:16px;align-items:center">
              <span style="font-family:'Bebas Neue',sans-serif;font-size:1.6rem;color:${z.color}">${t.pts} Pkt</span>
              <span style="font-size:1.1rem;color:var(--muted)">${t.wins}S ${t.draws}U ${t.losses}N</span>
            </div>
          </div>`).join('')}
      </div>
    </div>`;
  }
  grid.innerHTML = html;
}

// ── Tabelle toggle (via URL param or keyboard) ──
let standingsVisible = false;
function toggleStandings() {
  standingsVisible = !standingsVisible;
  document.getElementById('standings-overlay').classList.toggle('visible', standingsVisible);
}
// Keyboard: T = Tabelle ein/aus
document.addEventListener('keydown', e => { if (e.key === 't' || e.key === 'T') toggleStandings(); });
// URL param: ?tabelle=1 startet mit Tabelle
if (new URLSearchParams(location.search).get('tabelle') === '1') toggleStandings();

function renderAll() { renderPairings(); renderStandings(); }

// ── Sponsors – CSS marquee (nahtloser Loop) ──
function initSponsors() {
  const slides = document.getElementById('sponsor-slides');
  if (!SPONSORS.length) {
    slides.innerHTML = '<div class="sponsor-slide"><div class="sponsor-name">Stöbelturnier 2026</div></div>';
    return;
  }
  const makeSlide = s => s.logo
    ? `<div class="sponsor-slide"><img src="${s.logo}" alt="${s.name}" onerror="this.outerHTML='<div class=\"sponsor-slide\"><div class=\"sponsor-name\">${s.name}</div></div>'"></div>`
    : `<div class="sponsor-slide"><div class="sponsor-name">${s.name}</div></div>`;
  // Doppelt für nahtlosen Loop
  const minCopies = Math.max(2, Math.ceil(12 / SPONSORS.length));
  let html = '';
  for (let i = 0; i < minCopies * 2; i++) SPONSORS.forEach(s => html += makeSlide(s));
  slides.innerHTML = html;
  // Breite messen + Animation starten
  requestAnimationFrame(() => requestAnimationFrame(() => {
    const els = slides.querySelectorAll('.sponsor-slide');
    let halfWidth = 0;
    for (let i = 0; i < els.length / 2; i++) halfWidth += els[i].getBoundingClientRect().width + 120;
    const dur = Math.max(15, SPONSORS.length * 6);
    const st = document.createElement('style');
    st.textContent = `@keyframes sponsor-scroll{0%{transform:translateX(0)}100%{transform:translateX(-${halfWidth}px)}}`;
    document.head.appendChild(st);
    slides.style.animation = `sponsor-scroll ${dur}s linear infinite`;
  }));
}
init();
initSponsors();

// expose toggleStandings globally
window.toggleStandings = toggleStandings;

</script>
<script>
// ── Auto-scale to screen (outside module) ──
function scaleToScreen() {
  const scaleX = window.innerWidth  / 3840;
  const scaleY = window.innerHeight / 2160;
  const scale  = Math.min(scaleX, scaleY);
  document.body.style.transform = `scale(${scale})`;
  document.body.style.transformOrigin = '0 0';
  const offsetX = (window.innerWidth  - 3840 * scale) / 2;
  const offsetY = (window.innerHeight - 2160 * scale) / 2;
  document.body.style.marginLeft = offsetX + 'px';
  document.body.style.marginTop  = offsetY + 'px';
  document.documentElement.style.background = '#000';
}
scaleToScreen();
window.addEventListener('resize', scaleToScreen);
</script>
</body>
